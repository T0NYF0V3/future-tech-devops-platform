version: '3.9'

services:

  flask-app:

    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: flask-app

    ports:
      - "5000:5000"

    restart: always

  nginx:

    image: nginx:latest

    container_name: nginx-proxy

    ports:
      - "80:80"

    volumes:
      - ./app/nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - flask-app
